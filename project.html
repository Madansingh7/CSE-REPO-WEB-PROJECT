<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View computer science student project details.">
    <title>Project Details — CSE Repository</title>
    <!-- Link to the external stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Unique ID to help js/app.js know we are on the Details page -->
    <div id="detail-page"></div>

    <!-- ==========================================
         HEADER & NAVIGATION
         ========================================== -->
    <header>
        <div class="header-inner">
            <a class="site-title" href="index.html"><span>CSE</span> Project Repo</a>
            <nav>
                <a href="index.html">Home</a>
                <a href="projects.html">All Projects</a>
                <a href="upload.html">Upload Project</a>
            </nav>
        </div>
    </header>

    <!-- ==========================================
         MAIN CONTENT
         ========================================== -->
    <main class="container">
        
        <!-- Back button link -->
        <a class="back-link" href="projects.html">← Back to All Projects</a>

        <!-- ==========================================
             PROJECT DETAIL CARD
             ========================================== -->
        <!-- This container is dynamically populated with details of the specific project via js/app.js -->
        <div class="detail-card" id="project-detail-card">
            <!-- Dynamic project details go here -->
            <p style="color: var(--text-light);">Loading project details...</p>
        </div>

    </main>

    <!-- ==========================================
         FOOTER
         ========================================== -->
    <footer>
        <p><strong>CSE Project Repository</strong> &mdash; Computer Science Department &copy; 2026</p>
    </footer>

    <!-- Link to our JavaScript logic file -->
    <script src="app.js"></script>
</body>
</html>
